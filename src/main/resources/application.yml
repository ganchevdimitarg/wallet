server:
  port: 8080

spring:
  datasource:
    primary:
      jdbc-url: jdbc:postgresql://localhost:5432/wallet_db
      username: wallet_user
      password: ${DB_PASSWORD}
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 3000
    replica:
      jdbc-url: jdbc:postgresql://localhost:5433/wallet_db
      username: wallet_user
      password: ${DB_PASSWORD}
      hikari:
        maximum-pool-size: 10        # fewer connections for reads
        minimum-idle: 2
        connection-timeout: 3000
        read-only: true              # Hikari-level guard — never issue writes

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/wallet_db
    user: wallet_user
    password: ${DB_PASSWORD}


resilience4j:
  circuitbreaker:
    instances:
      wallet-db:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

