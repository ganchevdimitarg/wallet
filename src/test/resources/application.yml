server:
  port: 0   # random port for parallel test execution

spring:
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  datasource:
    primary:
      jdbc-url: jdbc:postgresql://localhost:5432/placeholder
      username: placeholder
      password: placeholder
    replica:
      jdbc-url: jdbc:postgresql://localhost:5433/placeholder
      username: placeholder
      password: placeholder
      hikari:
        read-only: true

  data:
    redis:
      timeout: 2000ms

  flyway:
    enabled: true                 # Testcontainers gives real PostgreSQL — Flyway works
    url: jdbc:postgresql://localhost:5432/placeholder
    user: placeholder
    password: placeholder
    postgresql:
      transactional: false       # CONCURRENTLY indexes require non-transactional migration

resilience4j:
  circuitbreaker:
    instances:
      wallet-db:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: false
