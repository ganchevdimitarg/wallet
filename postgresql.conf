# =============================================================================
# PostgreSQL Configuration — Wallet Service
# Mount into container:  -v ./postgresql.conf:/etc/postgresql/postgresql.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Logging — slow query detection
# -----------------------------------------------------------------------------
log_min_duration_statement = 100   -- log any query taking over 100ms
log_statement = 'none'             -- don't log everything, only slow ones

log_line_prefix = '%t [%p] %q%u@%d '   -- timestamp, pid, app, user, database
log_timezone = 'UTC'
log_connections = on
log_disconnections = on
log_duration = off                 -- redundant; log_min_duration_statement covers it

# -----------------------------------------------------------------------------
# Connections
# -----------------------------------------------------------------------------
max_connections = 100

# -----------------------------------------------------------------------------
# Memory (tune per host resources)
# -----------------------------------------------------------------------------
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 16MB
maintenance_work_mem = 64MB

# -----------------------------------------------------------------------------
# Planner
# -----------------------------------------------------------------------------
random_page_cost = 1.1             # SSD-friendly
effective_io_concurrency = 200
